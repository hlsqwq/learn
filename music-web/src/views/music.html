<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YXMusic - 音乐发现</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #F5F5F7;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); }

        @keyframes fade-in { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-in { animation: fade-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .animate-spin-slow { animation: spin 10s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 磨砂玻璃效果增强 */
        .glass {
            background: rgba(245, 245, 247, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const { createApp, ref, onMounted, nextTick } = Vue;

        // --- 子组件：盒子型导航 ---
        const BoxNavItem = {
            props: ['label', 'active', 'iconName'],
            template: `
                <div 
                    @click="$emit('click')"
                    :class="[
                        'relative flex items-center justify-center w-20 h-14 rounded-2xl cursor-pointer transition-all duration-300 border border-transparent group overflow-hidden flex-shrink-0',
                        active ? 'bg-white shadow-md text-rose-500 border-white' : 'bg-gray-200/40 text-gray-500 hover:bg-white hover:shadow-sm hover:text-black'
                    ]"
                >
                    <div class="relative flex items-center justify-center w-full h-full">
                        <div :class="[
                            'absolute flex items-center justify-center transition-all duration-300',
                            active ? 'opacity-0 scale-75 -translate-y-2' : 'opacity-100 group-hover:opacity-0 group-hover:scale-75 group-hover:-translate-y-2'
                        ]">
                            <i :data-lucide="iconName" class="w-5 h-5"></i>
                        </div>
                        <span :class="[
                            'text-[11px] font-black transition-all duration-300',
                            active ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-2 group-hover:opacity-100 group-hover:translate-y-0'
                        ]">
                            {{ label }}
                        </span>
                    </div>
                </div>
            `
        };

        // --- 子组件：列表型导航 ---
        const NavItem = {
            props: ['label', 'active', 'iconName'],
            template: `
                <button 
                    @click="$emit('click')"
                    :class="[
                        'w-full flex items-center px-4 py-2.5 rounded-xl transition-all duration-300 group',
                        active ? 'bg-white shadow-sm text-rose-500' : 'text-gray-500 hover:bg-white/60 hover:text-black'
                    ]"
                >
                    <div :class="['flex-shrink-0 transition-transform duration-300', active ? 'scale-110 text-rose-500' : 'group-hover:scale-110']">
                        <i :data-lucide="iconName" class="w-[18px] h-[18px]"></i>
                    </div>
                    <span :class="[
                        'ml-3 text-xs tracking-tight truncate transition-colors',
                        active ? 'font-black text-rose-500' : 'font-bold text-gray-600 group-hover:text-black'
                    ]">
                        {{ label }}
                    </span>
                </button>
            `
        };

        // --- 主应用 ---
        const App = {
            components: { BoxNavItem, NavItem },
            setup() {
                const isPlaying = ref(false);
                const currentSong = ref(null);
                const activeTab = ref('new');
                const subTab = ref('favorite');
                const playlistTab = ref('created');

                const userName = "YX_User_08";
                const userAvatar = "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=200&h=200&fit=crop";

                const playlists = {
                    created: [
                        { id: 'c1', name: '午后轻音乐', count: 32, cover: 'https://picsum.photos/seed/m1/100/100' },
                        { id: 'c2', name: '自驾游歌单', count: 56, cover: 'https://picsum.photos/seed/m2/100/100' },
                        { id: 'c3', name: '深夜食堂', count: 18, cover: 'https://picsum.photos/seed/m3/100/100' },
                        { id: 'c4', name: '工作专注', count: 42, cover: 'https://picsum.photos/seed/m4/100/100' }
                    ],
                    bookmarked: [
                        { id: 'b1', name: '华语流行 2024', count: 100, cover: 'https://picsum.photos/seed/b1/100/100' },
                        { id: 'b2', name: '摇滚不老', count: 85, cover: 'https://picsum.photos/seed/b2/100/100' }
                    ]
                };

                const refreshIcons = () => {
                    nextTick(() => {
                        lucide.createIcons();
                    });
                };

                const handleNavClick = (tab, sub = null) => {
                    activeTab.value = tab;
                    if (sub) subTab.value = sub;
                    refreshIcons();
                };

                const handlePlaySong = (item) => {
                    currentSong.value = { 
                        name: item.name, 
                        artist: 'YX 精选', 
                        cover: item.cover 
                    };
                    isPlaying.value = true;
                    refreshIcons();
                };

                onMounted(() => {
                    refreshIcons();
                });

                return {
                    isPlaying, currentSong, activeTab, subTab, playlistTab,
                    userName, userAvatar, playlists,
                    handleNavClick, handlePlaySong
                };
            },
            template: `
                <div class="flex h-screen overflow-hidden">
                    <!-- 侧边栏 -->
                    <aside class="w-56 bg-gray-100/40 backdrop-blur-xl border-r border-gray-200 flex flex-col z-20">
                        <div class="flex-1 overflow-y-auto custom-scrollbar flex flex-col">
                            <!-- Logo -->
                            <div class="flex items-center justify-center space-x-2 text-rose-500 py-8 px-4 cursor-pointer" @click="handleNavClick('new')">
                                <div class="bg-rose-500 p-2 rounded-xl shadow-lg shadow-rose-200 flex-shrink-0">
                                    <i data-lucide="music" class="w-5 h-5 text-white"></i>
                                </div>
                                <span class="font-black italic tracking-tighter text-xl text-black">YXMusic</span>
                            </div>

                            <!-- 盒子型导航：发现与榜单 -->
                            <div class="px-4 flex items-center justify-center space-x-3 mb-6">
                                <BoxNavItem label="发现" iconName="layout-grid" :active="activeTab === 'new'" @click="handleNavClick('new')" />
                                <BoxNavItem label="榜单" iconName="trophy" :active="activeTab === 'ranking'" @click="handleNavClick('ranking')" />
                            </div>

                            <div class="px-6 mb-2"><div class="h-[1px] w-full bg-gray-200/60"></div></div>

                            <!-- 个人媒体库导航 -->
                            <div class="px-4 space-y-1 mb-6">
                                <NavItem label="我喜欢" iconName="heart" :active="activeTab === 'library' && subTab === 'favorite'" @click="handleNavClick('library', 'favorite')" />
                                <NavItem label="播放记录" iconName="history" :active="activeTab === 'library' && subTab === 'history'" @click="handleNavClick('library', 'history')" />
                            </div>

                            <!-- 歌单切换区域 -->
                            <div class="px-4 flex-1 flex flex-col min-h-[200px]">
                                <div class="flex bg-gray-200/50 p-1 rounded-xl mb-3 flex-shrink-0">
                                    <button @click="playlistTab = 'created'" :class="['flex-1 py-1.5 text-[10px] font-black rounded-lg transition-all', playlistTab === 'created' ? 'bg-white shadow-sm text-black' : 'text-gray-400']">自建</button>
                                    <button @click="playlistTab = 'bookmarked'" :class="['flex-1 py-1.5 text-[10px] font-black rounded-lg transition-all', playlistTab === 'bookmarked' ? 'bg-white shadow-sm text-black' : 'text-gray-400']">收藏</button>
                                </div>
                                <div class="space-y-1 flex-1 overflow-y-auto custom-scrollbar pr-1 pb-4">
                                    <div v-for="list in playlists[playlistTab]" :key="list.id" @click="handlePlaySong(list)" class="flex items-center p-2 rounded-xl hover:bg-white/60 transition-all cursor-pointer group">
                                        <img :src="list.cover" class="w-8 h-8 rounded-md bg-gray-200 object-cover shadow-sm" />
                                        <div class="ml-3 min-w-0">
                                            <p class="text-[11px] font-bold text-gray-700 group-hover:text-black truncate transition-colors">{{ list.name }}</p>
                                            <p class="text-[9px] font-bold text-gray-400">{{ list.count }} 首</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 底部用户入口 -->
                        <div class="p-4 border-t border-gray-200/80">
                            <div @click="handleNavClick('profile')" class="py-2.5 px-3 bg-white/50 rounded-2xl flex items-center space-x-3 shadow-sm cursor-pointer hover:bg-white hover:shadow-md transition-all border border-transparent">
                                <img :src="userAvatar" class="w-9 h-9 rounded-full object-cover shadow-sm border border-white" />
                                <div class="flex-1 min-w-0">
                                    <p class="text-[11px] font-black truncate">{{ userName }}</p>
                                    <p class="text-[8px] text-gray-400 font-bold uppercase tracking-tight">个人中心</p>
                                </div>
                                <i data-lucide="chevron-right" class="w-3 h-3 text-gray-400"></i>
                            </div>
                        </div>
                    </aside>

                    <!-- 主内容区域 -->
                    <main class="flex-1 flex flex-col relative bg-[#F5F5F7]">
                        <!-- 搜索栏 Header -->
                        <header class="h-16 flex items-center px-10 glass sticky top-0 z-10">
                            <div class="relative w-full max-w-xl group">
                                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-rose-500 w-4 h-4 transition-colors"></i>
                                <input type="text" placeholder="搜索你心仪的旋律..." class="w-full bg-white/60 border-none rounded-2xl py-2 pl-11 pr-4 text-sm font-medium shadow-sm ring-1 ring-black/5 focus:ring-2 focus:ring-rose-500/20 outline-none transition-all" />
                            </div>
                        </header>

                        <div class="flex-1 overflow-y-auto custom-scrollbar pb-28 px-10">
                            <div class="max-w-6xl mx-auto py-8">
                                <!-- 发现页面内容 -->
                                <div v-if="activeTab === 'new'" class="animate-in">
                                    <div class="flex items-end justify-between mb-8">
                                        <h1 class="text-4xl font-black tracking-tight">新发现</h1>
                                        <button class="text-rose-500 font-bold text-xs hover:underline">查看全部</button>
                                    </div>
                                    
                                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        <div v-for="i in 8" :key="i" class="group cursor-pointer" @click="handlePlaySong({name: '精选辑 Vol.' + i, cover: 'https://picsum.photos/seed/p'+i+'/400/400'})">
                                            <div class="aspect-square rounded-[1.5rem] overflow-hidden mb-3 shadow-md relative bg-white">
                                                <img :src="'https://picsum.photos/seed/p' + (i+20) + '/400/400'" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                                <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                                    <div class="w-12 h-12 bg-white/90 rounded-full flex items-center justify-center shadow-lg transform translate-y-2 group-hover:translate-y-0 transition-transform">
                                                        <i data-lucide="play" class="w-5 h-5 text-black fill-current ml-1"></i>
                                                    </div>
                                                </div>
                                            </div>
                                            <h4 class="font-black text-sm truncate px-1">未来回响 Vol.{{i}}</h4>
                                            <p class="text-[10px] text-gray-400 font-bold mt-0.5 px-1 uppercase tracking-widest">YXMusic 编辑推荐</p>
                                        </div>
                                    </div>
                                </div>

                                <!-- 其他占位页面 -->
                                <div v-else class="flex flex-col items-center justify-center py-32 text-gray-300 animate-in">
                                    <div class="relative">
                                        <i data-lucide="disc" class="w-20 h-20 animate-spin-slow opacity-20"></i>
                                        <i data-lucide="music" class="w-8 h-8 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-gray-400"></i>
                                    </div>
                                    <h2 class="text-xl font-black mt-6 text-gray-400">正在为您加载 {{ activeTab === 'ranking' ? '榜单' : activeTab === 'profile' ? '个人主页' : '媒体库' }}...</h2>
                                    <p class="text-xs font-bold mt-2 text-gray-300 uppercase tracking-widest">YXMusic Cloud Service</p>
                                </div>
                            </div>
                        </div>

                        <!-- 底部播放器组件 -->
                        <footer class="h-20 glass border-t border-gray-200/60 fixed bottom-0 left-56 right-0 z-30 px-10 flex items-center justify-between shadow-2xl">
                            <!-- 歌曲信息 -->
                            <div class="flex items-center space-x-4 w-1/4">
                                <div class="w-12 h-12 rounded-xl bg-white overflow-hidden shadow-inner flex items-center justify-center border border-gray-100 flex-shrink-0">
                                    <img v-if="currentSong?.cover" :src="currentSong.cover" class="w-full h-full object-cover" />
                                    <i v-else data-lucide="music" class="w-5 h-5 text-gray-200"></i>
                                </div>
                                <div class="min-w-0">
                                    <h4 class="text-sm font-black truncate leading-tight">{{ currentSong?.name || '未在播放' }}</h4>
                                    <p class="text-[9px] text-rose-500 font-black uppercase tracking-widest mt-1">{{ currentSong?.artist || 'YXMusic' }}</p>
                                </div>
                            </div>

                            <!-- 播放控制 -->
                            <div class="flex flex-col items-center flex-1 max-w-xl px-10">
                                <div class="flex items-center space-x-8 mb-2">
                                    <button class="text-gray-400 hover:text-black transition-colors"><i data-lucide="skip-back" class="w-4.5 h-4.5"></i></button>
                                    <button @click="isPlaying = !isPlaying" class="w-10 h-10 flex items-center justify-center rounded-full bg-black text-white hover:scale-110 active:scale-95 transition-all shadow-xl">
                                        <i v-if="isPlaying" data-lucide="pause" class="w-4 h-4 fill-current"></i>
                                        <i v-else data-lucide="play" class="w-4 h-4 fill-current ml-0.5"></i>
                                    </button>
                                    <button class="text-gray-400 hover:text-black transition-colors"><i data-lucide="skip-forward" class="w-4.5 h-4.5"></i></button>
                                </div>
                                <div class="w-full flex items-center space-x-3 text-[9px] text-gray-400 font-black tracking-tighter">
                                    <span>2:14</span>
                                    <div class="flex-1 h-1 bg-gray-200 rounded-full relative overflow-hidden cursor-pointer group">
                                        <div class="absolute top-0 left-0 h-full bg-rose-500 w-1/3 group-hover:bg-rose-600 transition-colors"></div>
                                    </div>
                                    <span>4:56</span>
                                </div>
                            </div>

                            <!-- 音量与辅助 -->
                            <div class="flex items-center justify-end space-x-6 w-1/4">
                                <i data-lucide="list-music" class="w-4 h-4 text-gray-400 cursor-pointer hover:text-black"></i>
                                <div class="flex items-center space-x-3">
                                    <i data-lucide="volume-2" class="w-4 h-4 text-gray-400"></i>
                                    <div class="w-20 h-1 bg-gray-200 rounded-full overflow-hidden cursor-pointer"><div class="h-full bg-black w-2/3"></div></div>
                                </div>
                            </div>
                        </footer>
                    </main>
                </div>
            `
        };

        createApp(App).mount('#app');
    </script>
</body>
</html>
